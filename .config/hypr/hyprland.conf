# Hyprland configuration
# Ported from AeroSpace + yabai/skhd macOS setup
# Monokai Pro color scheme

# ===== Monitor =====
monitor = , preferred, auto, 1

# ===== Autostart =====
exec-once = quickshell
exec-once = hyprpaper
exec-once = vicinae server                                    # Raycast-like launcher (daemon mode)

# ===== Environment =====
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# ===== General =====
general {
    # Gaps matching AeroSpace: inner=6, outer=4
    gaps_in = 3        # 6/2 per side = 3 each side (total 6 between windows)
    gaps_out = 4       # outer.left/right/top/bottom = 4

    border_size = 2

    # Monokai Pro colors
    col.active_border = rgb(fc5d7c) rgb(b39df3) 45deg   # red → magenta gradient
    col.inactive_border = rgb(2c2e34)                     # bar.border

    layout = dwindle

    allow_tearing = false
}

# ===== Decoration =====
decoration {
    rounding = 9       # Matching sketchybar border_radius

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1c2688)
    }
}

# ===== Animations =====
animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, snappy
    animation = windowsOut, 1, 5, snappy, popin 80%
    animation = border, 1, 8, snappy
    animation = borderangle, 1, 6, snappy
    animation = fade, 1, 5, snappy
    animation = workspaces, 1, 4, snappy
}

# ===== Layout =====
dwindle {
    # BSP-like behavior matching AeroSpace tiles layout
    pseudotile = true
    preserve_split = true
    force_split = 2            # Always split to the right/bottom
    split_width_multiplier = 1.0   # Equal splits (AeroSpace split_ratio=0.50)
}

master {
    new_status = master
}

# ===== Input =====
input {
    kb_layout = us
    kb_variant = colemak_dh_ortho
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ===== Misc =====
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_focuses_monitor = true    # on-focused-monitor-changed = move-mouse
    focus_on_activate = true
}

# ===== Key Bindings =====
# Colemak-DH ortholinear layout (via kanata + XKB)
# MNEI = left/down/up/right (vim HJKL equivalent)

# --- Navigation (focus) ---
# Colemak-DH MNEI (physical HJKL positions)
bind = SUPER, M, movefocus, l
bind = SUPER, N, movefocus, d
bind = SUPER, E, movefocus, u
bind = SUPER, I, movefocus, r

# Arrow keys as fallback
bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r

# --- Move/Warp windows ---
bind = SUPER SHIFT, M, movewindow, l
bind = SUPER SHIFT, N, movewindow, d
bind = SUPER SHIFT, E, movewindow, u
bind = SUPER SHIFT, I, movewindow, r

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r

# --- Workspace focus ---
# AeroSpace: alt-1..8 = workspace N
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8

# --- Send window to workspace (silent, don't follow) ---
# AeroSpace: alt-shift-1..8 = move-node-to-workspace N
bind = ALT SHIFT, 1, movetoworkspacesilent, 1
bind = ALT SHIFT, 2, movetoworkspacesilent, 2
bind = ALT SHIFT, 3, movetoworkspacesilent, 3
bind = ALT SHIFT, 4, movetoworkspacesilent, 4
bind = ALT SHIFT, 5, movetoworkspacesilent, 5
bind = ALT SHIFT, 6, movetoworkspacesilent, 6
bind = ALT SHIFT, 7, movetoworkspacesilent, 7
bind = ALT SHIFT, 8, movetoworkspacesilent, 8

# --- Move window to workspace AND follow ---
# AeroSpace: cmd-ctrl-1..9
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5
bind = SUPER CTRL, 6, movetoworkspace, 6
bind = SUPER CTRL, 7, movetoworkspace, 7
bind = SUPER CTRL, 8, movetoworkspace, 8
bind = SUPER CTRL, 9, movetoworkspace, 9

# --- Balance window sizes ---
# AeroSpace: alt-shift-e = balance-sizes
# No direct equivalent, but we can use dwindle:pseudo to reset
bind = ALT SHIFT, E, pseudo

# --- Fullscreen toggle ---
# AeroSpace: alt-f = fullscreen
bind = ALT, F, fullscreen, 0

# --- Float/Tile toggle ---
# AeroSpace: alt-shift-space = layout floating tiling
bind = ALT SHIFT, space, togglefloating

# --- Rotate / Toggle split ---
# AeroSpace: alt-r = layout tiles horizontal vertical
bind = ALT, R, togglesplit

# --- Resize mode (submap) ---
# AeroSpace: cmd-alt-ctrl-shift-r = mode resize
bind = SUPER ALT CTRL SHIFT, R, submap, resize

submap = resize
    # Colemak-DH MNEI navigation
    bind = , M, resizeactive, -50 0
    bind = , I, resizeactive, 50 0
    bind = , E, resizeactive, 0 -50
    bind = , N, resizeactive, 0 50
    # Arrow keys as fallback
    bind = , left, resizeactive, -50 0
    bind = , right, resizeactive, 50 0
    bind = , up, resizeactive, 0 -50
    bind = , down, resizeactive, 0 50
    bind = , minus, resizeactive, -50 -50
    bind = , equal, resizeactive, 50 50
    bind = , Return, submap, reset
    bind = , escape, submap, reset
    bind = SUPER ALT CTRL SHIFT, R, submap, reset
submap = reset

# --- Reload config ---
# AeroSpace: ctrl-alt-r = reload-config
# Hyprland auto-reloads on save, but we can force it
bind = CTRL ALT, R, exec, hyprctl reload

# --- Common launcher bindings ---
bind = SUPER, Return, exec, ghostty
bind = SUPER SHIFT, Return, exec, kitty
bind = SUPER, space, exec, vicinae toggle                     # Raycast-like launcher (matches macOS cmd+space)
bind = SUPER, B, exec, firefox
bind = SUPER, Q, killactive
bind = SUPER SHIFT, Q, exit

# --- Mouse bindings ---
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ===== Window Rules =====
# Matching AeroSpace float rules

# System Settings
windowrule = match:class org.gnome.Settings|xfce4-settings|pavucontrol|nm-connection-editor|blueman-manager, float on
windowrule = match:title Settings, float on

# Calculator
windowrule = match:class org.gnome.Calculator|galculator|qalculate-gtk, float on

# System Monitor (Activity Monitor equivalent)
windowrule = match:class gnome-system-monitor|htop|btop, float on

# File Manager dialogs
windowrule = match:title Copy|Move|Rename|Delete|Properties|Preferences, float on
windowrule = match:title "Open File|Save File|Save As", float on

# Docker Desktop
windowrule = match:class com.docker.docker|docker-desktop, float on

# Spotify
windowrule = match:class Spotify|spotify, float on
windowrule = match:class Spotify|spotify, size 80% 80%
windowrule = match:class Spotify|spotify, center on

# Communication apps (WhatsApp, FaceTime equivalents)
windowrule = match:class whatsapp|signal|telegram|discord, float on
windowrule = match:title WhatsApp, float on

# Loom
windowrule = match:class loom, float on

# Picture-in-Picture
windowrule = match:title "Picture-in-Picture", float on
windowrule = match:title "Picture-in-Picture", pin on
windowrule = match:title "Picture-in-Picture", size 480 270

# General dialogs and popups
windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class polkit-gnome-authentication-agent-1, float on

# ===== Vicinae Layer Rules =====
layerrule = blur on, ignore_alpha 0, match:namespace vicinae
layerrule = no_anim on, match:namespace vicinae

# ===== Workspace Rules =====
# Reserve top space for quickshell bar (40px height matching sketchybar)
# This is handled by quickshell's layer-shell anchoring
